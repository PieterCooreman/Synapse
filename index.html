    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Markdown parser + syntax highlighter + HTML sanitizer -->

    <style>
        :root { --chat-max: 900px; }

        html, body { height: 100%; }
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        #chat-container {
            width: 100%;
            max-width: var(--chat-max);
            height: auto;          /* size to content... */
            max-height: 95vh;      /* ...but never taller than the viewport */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 1rem;
        }

        #chat-history {
            flex: 1 1 auto;
            min-height: 0;          /* allow it to shrink/scroll inside the flex card */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 85%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            line-height: 1.55;
            word-wrap: break-word;
        }
        .user-message {
            align-self: flex-end;
            border-bottom-right-radius: 0.15rem;
            white-space: pre-wrap;
        }
        .bot-message {
            align-self: flex-start;
            border-bottom-left-radius: 0.15rem;
            min-width: 260px;
        }
        .system-error { align-self: center; max-width: 95%; }

        /* Markdown internals */
        .message p { margin: 0 0 0.6rem 0; }
        .message p:last-child { margin: 0; }
        /* Scale headings down so they fit naturally in chat bubbles */
        .message h1, .message h2, .message h3,
        .message h4, .message h5, .message h6 {
            font-weight: 600;
            line-height: 1.3;
            margin: 0.8rem 0 0.4rem 0;
        }
        .message h1:first-child, .message h2:first-child, .message h3:first-child,
        .message h4:first-child, .message h5:first-child, .message h6:first-child { margin-top: 0; }
        .message h1 { font-size: 1.6rem; }
        .message h2 { font-size: 1.4rem; }
        .message h3 { font-size: 1.2rem; }
        .message h4 { font-size: 1.05rem; }
        .message h5, .message h6 { font-size: 0.95rem; opacity: 0.85; }
        .message ul, .message ol { margin: 0 0 0.6rem 0; padding-left: 1.25rem; }
        .message li { margin-bottom: 0.25rem; }
        .message :not(pre) > code {
            font-size: 0.875em;
            padding: 0.15em 0.35em;
            border-radius: 0.3rem;
            background: var(--bs-tertiary-bg);
        }
		.message table { width: 100%; overflow-x: auto; display: block; }

        /* Code block wrapper with per-block copy button */
        .code-block { position: relative; margin: 0.75rem 0; }
        .code-block pre {
            margin: 0;
            border-radius: 0.6rem;
            overflow-x: auto;
        }
        .code-block pre code {
            display: block;
            padding: 1rem;
            font-size: 0.85rem;
            border-radius: 0.6rem;
        }
        .code-lang {
            position: absolute;
            top: 0.4rem;
            left: 0.7rem;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            opacity: 0.55;
            user-select: none;
            pointer-events: none;
        }
        .code-actions {
            position: absolute;
            top: 0.4rem;
            right: 0.4rem;
            display: flex;
            gap: 0.3rem;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 2;
        }
        .code-block:hover .code-actions { opacity: 1; }

        /* Always-visible action bar under the code block */
        .code-actions-bottom {
            display: flex;
            justify-content: flex-end;
            gap: 0.4rem;
            margin-top: 0.4rem;
        }

        /* Live preview iframe — fills the fullscreen modal body */
        #preview-modal .modal-body { display: flex; gap: 0.5rem; overflow: hidden; }
        #preview-frame {
            width: 100%;
            height: 100%;
            flex: 1;
            border: 0;
            border-radius: 0.5rem;
            background: #fff;
        }
        /* HTML source editor — shown side-by-side with the preview when editing */
        #preview-editor {
            flex: 1;
            height: 100%;
            resize: none;
            white-space: pre;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        /* When the editor is visible, split the body 50/50 */
        #preview-body:not(.editing) #preview-editor { display: none !important; }

        .message-meta {
            font-size: 0.72rem;
            margin-top: 0.6rem;
            padding-top: 0.45rem;
            border-top: 1px solid var(--bs-border-color);
            font-family: var(--bs-font-monospace);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        #user-input {
            resize: none;
            max-height: 200px;
            overflow-y: auto;
        }

        .typing-dots span {
            display: inline-block;
            width: 6px; height: 6px;
            margin: 0 1px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.4;
            animation: blink 1.2s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

        /* Mic button while actively listening */
        #mic-btn.listening {
            color: #fff;
            background-color: var(--bs-danger);
            border-color: var(--bs-danger);
            animation: micpulse 1.2s infinite;
        }
        @keyframes micpulse {
            0%   { box-shadow: 0 0 0 0 rgba(220,53,69,0.6); }
            70%  { box-shadow: 0 0 0 8px rgba(220,53,69,0); }
            100% { box-shadow: 0 0 0 0 rgba(220,53,69,0); }
        }

        #chat-history::-webkit-scrollbar { width: 10px; }
        #chat-history::-webkit-scrollbar-thumb {
            background: var(--bs-border-color);
            border-radius: 8px;
        }

        /* Status pill (LED dot + label) */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.18rem 0.6rem 0.18rem 0.5rem;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            line-height: 1;
            background: var(--bs-tertiary-bg);
            border: 1px solid var(--bs-border-color);
            color: var(--bs-secondary-color);
            user-select: none;
            transition: color 0.2s, background 0.2s, border-color 0.2s;
        }
        .status-dot-led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 0 0 currentColor;
            flex: 0 0 auto;
        }
        /* Per-state colors driven by data-state */
        .status-pill[data-state="idle"]    { color: var(--bs-secondary-color); }
        .status-pill[data-state="ok"]      { color: var(--bs-success); }
        .status-pill[data-state="busy"]    { color: var(--bs-warning); }
        .status-pill[data-state="error"]   { color: var(--bs-danger); }
        .status-pill[data-state="offline"] { color: var(--bs-danger); }
        /* Pulse the LED while generating */
        .status-pill[data-state="busy"] .status-dot-led {
            animation: status-pulse 1.2s ease-in-out infinite;
        }
        @keyframes status-pulse {
            0%   { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
            70%  { box-shadow: 0 0 0 5px transparent; opacity: 0.6; }
            100% { box-shadow: 0 0 0 0 transparent; opacity: 1; }
        }
        /* Soft glow when connected */
        .status-pill[data-state="ok"] .status-dot-led,
        .status-pill[data-state="error"] .status-dot-led,
        .status-pill[data-state="offline"] .status-dot-led {
            box-shadow: 0 0 6px 0 currentColor;
        }

        /* Brand logo */
        .synapse-logo {
            display: inline-flex;
            align-items: center;
            line-height: 0;
            filter: drop-shadow(0 0 6px rgba(110, 168, 254, 0.35));
        }
        .synapse-logo svg { display: block; }
    </style>
</head>
<body class="bg-body-tertiary">

    <div id="chat-container" class="card shadow-lg border">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        /* ---------- Element refs ---------- */
        const chatHistory   = document.getElementById('chat-history');
        const userInput     = document.getElementById('user-input');
        const sendBtn       = document.getElementById('send-btn');
        const cancelBtn     = document.getElementById('cancel-btn');
        const regenerateBtn = document.getElementById('regenerate-btn');
        const clearBtn      = document.getElementById('clear-btn');
        const themeBtn      = document.getElementById('theme-btn');
        const providerSelect= document.getElementById('provider-select');
        const modelSelect   = document.getElementById('model-select');
        const refreshBtn    = document.getElementById('refresh-models-btn');
        const tempRange     = document.getElementById('temp-range');
        const tempValue     = document.getElementById('temp-value');
        const tempWarn      = document.getElementById('temp-warn');
        const statusDot     = document.getElementById('status-dot');
        const hljsTheme     = document.getElementById('hljs-theme');

        let currentAbortController = null;

        /* ---------- marked + highlight.js ---------- */
        marked.setOptions({
            highlight: (code, lang) =>
                (lang && hljs.getLanguage(lang))
                    ? hljs.highlight(code, { language: lang }).value
                    : hljs.highlightAuto(code).value,
            langPrefix: 'hljs language-'
        });

        const DEFAULT_SYSTEM_PROMPT = "You are Synapse, an expert coding assistant. You provide clear answers formatted in Markdown. IMPORTANT: You must ALWAYS wrap HTML, CSS, JavaScript, and any other code snippets inside triple backtick (```) Markdown code blocks, and label the language after the opening backticks.";

        /* ---------- Personas (named system prompts) ---------- */
        const PERSONAS_KEY = 'synapse-personas';
        const ACTIVE_PERSONA_KEY = 'synapse-active-persona';

        // Built-in starter personas for local AI-Lab.
		const DEFAULT_PERSONAS = [
			// `temp` is the recommended default temperature for each persona:
			// low (≈0.2–0.4) for precise/code/factual work, higher (≈0.8–1.0) for creative work.
			{ name: "None", temp: 0.6, prompt: "" },
			{ name: "Blog Writer",      temp: 0.8, prompt: "You are a skilled blog writer. Write engaging, well-structured articles in Markdown with clear headings, short paragraphs and a friendly, confident tone. Ask for the target audience if it is unclear." },
			{ name: "Brainstormer",       temp: 1.0, prompt: "You are a creative brainstorming partner. Generate diverse, lateral-thinking ideas based on the user's prompt. Format your output as a rapid-fire list of concepts with one-sentence descriptions. Prioritize quantity and variety." },
			{ name: "CLI & Linux Expert", temp: 0.2, prompt: "You are a strict Linux and command-line expert. Provide safe, efficient shell commands and bash scripts. Briefly explain the flags and syntax used. Always wrap commands in fenced code blocks." },
			{ name: "Coding Assistant", temp: 0.3, prompt: DEFAULT_SYSTEM_PROMPT },
			{ name: "Data Analyst",       temp: 0.3, prompt: "You are a data analyst specializing in Python (pandas, numpy). Write clean, efficient code for data manipulation and visualization. Briefly explain your data transformations. Enclose code in fenced blocks." },
			{ name: "Musician",         temp: 1.0, prompt: "You are an experienced musician and songwriter. Help with lyrics, chord progressions, song structure, music theory and production tips. Use Markdown; put chords or tablature in code blocks." },
			{ name: "Proofreader",        temp: 0.2, prompt: "You are a strict copy editor. Correct grammar, punctuation, and awkward phrasing in the provided text. Output the corrected text first, followed by a concise bulleted list of the specific changes you made." },
			{ name: "Rubber Duck (Debug)",temp: 0.4, prompt: "You are a 'rubber duck' debugging assistant. Do not write the full solution immediately. Ask probing questions, point out logical flaws in my code, and guide me to find the answer myself. Be analytical and concise." },
			{ name: "Single-File HTML Builder", temp: 0.3, prompt: "You build complete, self-contained single-file websites. ALWAYS output exactly ONE complete index.html document and nothing else. Put ALL CSS inside a single <style> tag in the <head>, and ALL JavaScript inside a single <script> tag before </body> — never reference external .css or .js files. Output ONLY one fenced ```html code block: no explanations, no commentary, no design critique, and no multiple code blocks. The file must be ready to save and open directly in a browser. Do not use placeholder asset paths that require external files; if you need images, use inline SVG, CSS gradients, or data URIs. Write clean, modern, responsive markup." },
			{ name: "Teacher",            temp: 0.6, prompt: "You are a patient and encouraging teacher. Break down complex concepts into simple, easy-to-understand explanations. Use analogies, step-by-step examples, and ask guiding questions to check for understanding. Adapt your tone to be supportive and do not simply give away the answer if the user is trying to learn how to solve a problem themselves." },
			{ name: "Text Summarizer",    temp: 0.3, prompt: "You are a precise summarization tool. Distill the provided text into its core arguments and key facts. Use bullet points and bold text for readability. Strictly avoid adding external information or your own opinions." },
			{ name: "Web Designer",     temp: 0.5, prompt: "You are a senior web/UI designer. Give opinionated, practical design advice on layout, spacing, color, typography and accessibility. When you produce HTML/CSS, wrap it in fenced code blocks and prefer clean, modern, responsive markup." },
		];

        function loadPersonas() {
            try {
                const raw = localStorage.getItem(PERSONAS_KEY);
                if (raw) {
                    const arr = JSON.parse(raw);
                    if (Array.isArray(arr) && arr.length) return arr;
                }
            } catch (e) { console.warn('Could not load personas', e); }
            return DEFAULT_PERSONAS.slice();
        }
        function savePersonas() {
            localStorage.setItem(PERSONAS_KEY, JSON.stringify(personas));
        }

        let personas = loadPersonas();
        let activePersonaName = localStorage.getItem(ACTIVE_PERSONA_KEY) || personas[0].name;
        // Normalize in case the stored active persona was deleted/renamed.
        if (!personas.some(p => p.name === activePersonaName)) activePersonaName = personas[0].name;
        function getActivePersona() {
            return personas.find(p => p.name === activePersonaName) || personas[0];
        }
        // SYSTEM_PROMPT stays the single source of truth used by the rest of the app.
        let SYSTEM_PROMPT = getActivePersona().prompt;

        const configs = {
            'lm-studio': {
                base: "http://127.0.0.1:1234",
                models: ["local-model"]
            },
            'ollama': {
                base: "http://127.0.0.1:11434",
                models: []
            }
        };

        let messagesContext = [{ role: "system", content: SYSTEM_PROMPT }];

        /* ---------- Conversation persistence ---------- */
        const HISTORY_KEY = 'synapse-history';

        function saveHistory() {
            try {
                localStorage.setItem(HISTORY_KEY, JSON.stringify(messagesContext));
            } catch (e) { console.warn('Could not save history', e); }
        }

        function loadHistory() {
            try {
                const raw = localStorage.getItem(HISTORY_KEY);
                if (!raw) return false;
                const saved = JSON.parse(raw);
                if (!Array.isArray(saved) || saved.length === 0) return false;
                messagesContext = saved;
                // Keep the system prompt in sync with whatever was stored.
                if (saved[0]?.role === 'system') SYSTEM_PROMPT = saved[0].content;
                return true;
            } catch (e) {
                console.warn('Could not load history', e);
                return false;
            }
        }

        function renderHistory() {
            chatHistory.innerHTML = '';
            let hasTurns = false;
            messagesContext.forEach(m => {
                if (m.role === 'user') { addMessageToUI(m.content, 'user-message'); hasTurns = true; }
                else if (m.role === 'assistant') {
                    const bot = addMessageToUI(m.content, 'bot-message');
                    appendCopyMeta(bot, m.content);
                    hasTurns = true;
                }
            });
            if (hasTurns) regenerateBtn.disabled = false;
            chatHistory.scrollTop = chatHistory.scrollHeight;
            return hasTurns;
        }

        /* ---------- Theme handling ---------- */
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-bs-theme', theme);
            const icon = themeBtn.querySelector('i');
            const dark = theme === 'dark';
            icon.className = dark ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
            hljsTheme.href = dark
                ? "https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css"
                : "https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css";
            localStorage.setItem('synapse-theme', theme);
        }
        themeBtn.addEventListener('click', () => {
            const next = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
            applyTheme(next);
        });
        applyTheme(localStorage.getItem('synapse-theme') || 'dark');

        /* ---------- Status indicator ---------- */
        function setStatus(state, titleOverride) {
            // state: idle | busy | error | ok | offline
            const labels = {
                idle:    'Idle',
                busy:    'Generating…',
                error:   'Error',
                ok:      'Connected',
                offline: 'Offline'
            };
            const key = labels[state] ? state : 'idle';
            statusDot.dataset.state = key;
            statusDot.title = titleOverride || labels[key];
            statusDot.querySelector('.status-dot-label').textContent = labels[key];
        }

        /* ---------- Code-block copy buttons ---------- */
        function enhanceCodeBlocks(container) {
            container.querySelectorAll('pre > code').forEach(codeEl => {
                const pre = codeEl.parentElement;
                if (pre.parentElement.classList.contains('code-block')) return; // already wrapped

                const wrapper = document.createElement('div');
                wrapper.className = 'code-block';
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(pre);

                // language label
                const langMatch = [...codeEl.classList].find(c => c.startsWith('language-'));
                if (langMatch) {
                    const label = document.createElement('span');
                    label.className = 'code-lang';
                    label.textContent = langMatch.replace('language-', '');
                    wrapper.appendChild(label);
                }

                const isHtml = isFullHtmlDoc(codeEl.innerText);

                // Builds a fresh set of action buttons (each placement needs its
                // own elements so their per-button state doesn't collide).
                // `withLabel` controls whether buttons show a text label.
                function buildActions(withLabel) {
                    const frag = document.createDocumentFragment();
                    const lbl = (text) => withLabel ? ' ' + text : '';

                    if (isHtml) {
                        // Preview
                        const previewBtn = document.createElement('button');
                        previewBtn.className = 'btn btn-sm btn-primary';
                        previewBtn.innerHTML = '<i class="bi bi-eye"></i>' + lbl('Preview');
                        previewBtn.title = 'Preview rendered page';
                        previewBtn.onclick = () => openPreview(codeEl.innerText);
                        frag.appendChild(previewBtn);

                        // Download
                        const downloadBtn = document.createElement('button');
                        downloadBtn.className = 'btn btn-sm btn-secondary';
                        downloadBtn.innerHTML = '<i class="bi bi-download"></i>' + lbl('Download');
                        downloadBtn.title = 'Download as .html';
                        downloadBtn.onclick = () =>
                            download(`synapse-${stamp()}.html`, codeEl.innerText, 'text/html');
                        frag.appendChild(downloadBtn);
                    }

                    // Copy — labelled "Copy HTML" for HTML output, "Copy" otherwise.
                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'btn btn-sm btn-secondary';
                    const copyName = isHtml ? 'Copy HTML' : 'Copy';
                    const copyIdle = '<i class="bi bi-clipboard"></i>' + lbl(copyName);
                    const copyDone = '<i class="bi bi-check2"></i>' + lbl('Copied');
                    copyBtn.innerHTML = copyIdle;
                    copyBtn.title = 'Copy ' + (isHtml ? 'HTML' : 'code');
                    copyBtn.onclick = async () => {
                        try {
                            await navigator.clipboard.writeText(codeEl.innerText);
                            copyBtn.innerHTML = copyDone;
                            copyBtn.classList.replace('btn-secondary', 'btn-success');
                            setTimeout(() => {
                                copyBtn.innerHTML = copyIdle;
                                copyBtn.classList.replace('btn-success', 'btn-secondary');
                            }, 1500);
                        } catch (e) { console.warn('Copy failed', e); }
                    };
                    frag.appendChild(copyBtn);
                    return frag;
                }

                // Top: floating overlay (appears on hover), icon-only.
                const topActions = document.createElement('div');
                topActions.className = 'code-actions';
                topActions.appendChild(buildActions(false));
                wrapper.appendChild(topActions);

                // Bottom: always-visible action bar with labelled buttons.
                const bottomActions = document.createElement('div');
                bottomActions.className = 'code-actions-bottom';
                bottomActions.appendChild(buildActions(true));
                wrapper.appendChild(bottomActions);
            });
        }

        /* Detects a full standalone HTML document: starts with <!doctype html>
           (optionally preceded by whitespace) and ends with </html>. */
        function isFullHtmlDoc(code) {
            const t = code.trim().toLowerCase();
            return t.startsWith('<!doctype html') && t.endsWith('</html>');
        }

        /* Opens the HTML snippet in a sandboxed iframe inside a modal. */
        let lastPreviewHtml = '';
        let previewModal = null;   // assigned once Bootstrap is ready (see below)

        /* Renders an HTML string into the sandboxed iframe, forcing a neutral
           light color-scheme so the preview never inherits the chatbot/OS theme. */
        function renderToFrame(html) {
            const forceLight = '<style>:root{color-scheme:light;}html{background:#fff;}</style>';
            let previewHtml = html;
            if (/<head[^>]*>/i.test(previewHtml)) {
                previewHtml = previewHtml.replace(/<head[^>]*>/i, m => m + forceLight);
            } else if (/<html[^>]*>/i.test(previewHtml)) {
                previewHtml = previewHtml.replace(/<html[^>]*>/i, m => m + forceLight);
            } else {
                previewHtml = forceLight + previewHtml;
            }
            // srcdoc renders the document; sandbox allows scripts but isolates it
            // from this page (no same-origin access, so it can't read our storage).
            document.getElementById('preview-frame').srcdoc = previewHtml;
        }

        function openPreview(html) {
            lastPreviewHtml = html;                       // current source for copy/download/new-tab
            document.getElementById('preview-editor').value = html;   // sync the editor
            renderToFrame(html);
            previewModal.show();
        }

        // `enhance` controls whether per-code-block action buttons (Copy/Preview/
        // Download) are added. We skip them while streaming so the Copy button
        // only appears once the reply is 100% generated.
        function renderMarkdown(el, text, enhance = true) {
            const dirty = marked.parse(text);
            // Sanitize: bot output is trusted-ish, but never inject raw HTML unchecked.
            el.innerHTML = (window.DOMPurify) ? DOMPurify.sanitize(dirty) : dirty;
            if (enhance) enhanceCodeBlocks(el);
        }

        /* ---------- Model dropdown ---------- */
        function fillModelDropdown(models, emptyText) {
            modelSelect.innerHTML = '';
            if (!models.length) {
                const opt = document.createElement('option');
                opt.textContent = emptyText || 'No models found';
                opt.disabled = true;
                modelSelect.appendChild(opt);
                return;
            }
            models.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m; opt.textContent = m;
                modelSelect.appendChild(opt);
            });
            const saved = localStorage.getItem('synapse-model');
            if (saved && models.includes(saved)) modelSelect.value = saved;
        }

        async function loadModels() {
            const provider = providerSelect.value;
            const cfg = configs[provider];
            const name = provider === 'lm-studio' ? 'LM Studio' : 'Ollama';
            // Try live model list from the OpenAI-compatible /v1/models endpoint
            try {
                const res = await fetch(cfg.base + '/v1/models', {
                    headers: { 'Authorization': 'Bearer local-dev' }
                });
                if (res.ok) {
                    const data = await res.json();
                    const live = (data.data || []).map(m => m.id).filter(Boolean);
                    if (live.length) { fillModelDropdown(live); setStatus('ok'); return; }
                    // Server is up but reports no models.
                    fillModelDropdown([], 'No models loaded in ' + name);
                    setStatus('ok');
                    return;
                }
                // Reachable but returned an HTTP error.
                fillModelDropdown(cfg.models, 'Backend error from ' + name);
                setStatus('error', name + ' responded with an error.');
            } catch (e) {
                // Connection refused / network failure => backend not running.
                fillModelDropdown(cfg.models, name + ' offline — start it & refresh');
                setStatus('offline',
                    `${name} is not reachable at ${cfg.base}. Start the local server `
                    + `(enable CORS) and click the refresh button.`);
            }
        }

        /* ---------- Add a message bubble ---------- */
        function addMessageToUI(text, senderClass) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', senderClass);
            if (senderClass === 'user-message') {
                msgDiv.classList.add('text-bg-primary');
                msgDiv.textContent = text;
            } else if (senderClass === 'bot-message') {
                msgDiv.classList.add('bg-body-secondary');
                renderMarkdown(msgDiv, text);
            }
            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
            return msgDiv;
        }

        function showTyping(el) {
            el.innerHTML = '<span class="typing-dots"><span></span><span></span><span></span></span>';
        }

        /* ---------- Reply meta bar (stats + copy button) ---------- */
        function appendCopyMeta(botMsgElement, fullReply, metaText) {
            const metaDiv = document.createElement('div');
            metaDiv.className = 'message-meta opacity-75';

            if (metaText) {
                const stats = document.createElement('span');
                stats.textContent = metaText;
                metaDiv.appendChild(stats);
            }

            const copyBtn = document.createElement('button');
            copyBtn.className = 'btn btn-sm btn-outline-secondary py-0 px-2';
            copyBtn.innerHTML = '<i class="bi bi-clipboard"></i> Copy';
            copyBtn.onclick = async () => {
                try {
                    const clone = botMsgElement.cloneNode(true);
                    clone.querySelector('.message-meta')?.remove();
                    const item = new ClipboardItem({
                        'text/html':  new Blob([clone.innerHTML], { type: 'text/html' }),
                        'text/plain': new Blob([fullReply],       { type: 'text/plain' })
                    });
                    await navigator.clipboard.write([item]);
                    copyBtn.innerHTML = '<i class="bi bi-check2"></i> Copied';
                } catch (err) {
                    await navigator.clipboard.writeText(fullReply);
                    copyBtn.innerHTML = '<i class="bi bi-check2"></i> Copied';
                }
                setTimeout(() => copyBtn.innerHTML = '<i class="bi bi-clipboard"></i> Copy', 1800);
            };
            metaDiv.appendChild(copyBtn);
            botMsgElement.appendChild(metaDiv);
        }

        /* ---------- Core send ---------- */
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || userInput.disabled) return;

            const userMsgElement = addMessageToUI(text, 'user-message');
            messagesContext.push({ role: "user", content: text });

            userInput.value = '';
            userInput.style.height = 'auto';
            await streamReply(userMsgElement);
        }

        async function streamReply(userMsgElement) {
            userInput.disabled = true;
            sendBtn.classList.add('d-none');
            cancelBtn.classList.remove('d-none');
            regenerateBtn.disabled = true;
            setStatus('busy');

            const botMsgElement = addMessageToUI("", 'bot-message');
            showTyping(botMsgElement);

            currentAbortController = new AbortController();
            const provider = providerSelect.value;
            const url = configs[provider].base + '/v1/chat/completions';
            const model = modelSelect.value;

            const startTime = performance.now();
            let fullReply = "";
            let usageData = null;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer local-dev'
                    },
                    signal: currentAbortController.signal,
                    body: JSON.stringify({
                        model: model,
                        messages: messagesContext,
                        temperature: parseFloat(tempRange.value),
                        stream: true,
                        stream_options: { include_usage: true }
                    })
                });

                if (!response.ok) throw new Error(`Status ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop();

                    for (const line of lines) {
                        const cleaned = line.trim();
                        if (!cleaned || cleaned === "data: [DONE]") continue;
                        if (cleaned.startsWith("data: ")) {
                            try {
                                const parsed = JSON.parse(cleaned.slice(6));
                                if (parsed.choices?.[0]?.delta?.content) {
                                    fullReply += parsed.choices[0].delta.content;
                                    // Render markdown live, but withhold code-block
                                    // action buttons until generation completes.
                                    renderMarkdown(botMsgElement, fullReply, false);
                                    chatHistory.scrollTop = chatHistory.scrollHeight;
                                }
                                if (parsed.usage) usageData = parsed.usage;
                            } catch (e) {
                                console.warn("Failed parsing streaming line:", cleaned, e);
                            }
                        }
                    }
                }

                const timeTaken = ((performance.now() - startTime) / 1000).toFixed(2);
                messagesContext.push({ role: "assistant", content: fullReply });

                // Generation is 100% complete: now add the code-block action
                // buttons (Copy / Preview / Download).
                renderMarkdown(botMsgElement, fullReply, true);

                /* Telemetry */
                let metaText = `⏱ ${timeTaken}s`;
                if (usageData) {
                    const total = usageData.total_tokens || 0;
                    const completion = usageData.completion_tokens || 0;
                    if (total > 0) metaText += ` · ${total} tok`;
                    if (completion > 0) metaText += ` · ${(completion / timeTaken).toFixed(1)} t/s`;
                } else {
                    const est = Math.ceil(fullReply.split(/\s+/).length * 1.3);
                    metaText += ` · ~${est} tok · ~${(est / timeTaken).toFixed(1)} t/s`;
                }

                appendCopyMeta(botMsgElement, fullReply, metaText);
                chatHistory.scrollTop = chatHistory.scrollHeight;

                saveHistory();
                setStatus('ok');
                regenerateBtn.disabled = false;

            } catch (error) {
                if (error.name === 'AbortError') {
                    botMsgElement.remove();
                    // Keep the user's message and context turn so they can retry/regenerate.
                    setStatus('idle');
                    regenerateBtn.disabled = false;
                } else {
                    console.error("Connection Error:", error);
                    botMsgElement.className = 'message system-error alert alert-danger mb-0';
                    const help = (provider === 'lm-studio')
                        ? "Ensure LM Studio's local server is running and CORS is enabled."
                        : 'Ensure Ollama is running and the OLLAMA_ORIGINS="*" environment flag is set.';
                    botMsgElement.textContent = `Cannot connect. ${help} (${error.message})`;
                    messagesContext.pop();
                    setStatus('error');
                }
            } finally {
                sendBtn.classList.remove('d-none');
                cancelBtn.classList.add('d-none');
                userInput.disabled = false;
                userInput.focus();
                currentAbortController = null;
            }
        }

        /* ---------- Regenerate last assistant reply ---------- */
        async function regenerate() {
            if (currentAbortController) return;
            // Drop the last assistant turn + its UI bubble
            if (messagesContext[messagesContext.length - 1]?.role === 'assistant') {
                messagesContext.pop();
            }
            const bubbles = chatHistory.querySelectorAll('.bot-message');
            if (bubbles.length) bubbles[bubbles.length - 1].remove();
            await streamReply(null);
        }

        /* ---------- Clear conversation ---------- */
        function clearChat() {
            messagesContext = [{ role: "system", content: SYSTEM_PROMPT }];
            localStorage.removeItem(HISTORY_KEY);
            chatHistory.innerHTML = '';
            const welcome = addMessageToUI("", 'bot-message');
            renderMarkdown(welcome, "Conversation cleared. **Ready when you are.**");
            regenerateBtn.disabled = true;
            setStatus('idle');
        }

        /* ---------- Export conversation ---------- */
        function download(filename, content, mime) {
            const blob = new Blob([content], { type: mime });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function stamp() {
            return new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
        }

        function exportJSON() {
            download(`synapse-chat-${stamp()}.json`,
                JSON.stringify(messagesContext, null, 2),
                'application/json');
        }

        function exportMarkdown() {
            const lines = [`# Synapse conversation`, `_Exported ${new Date().toLocaleString()}_`, ''];
            messagesContext.forEach(m => {
                if (m.role === 'system')      lines.push(`> **System prompt:** ${m.content}`, '');
                else if (m.role === 'user')   lines.push(`## You`, '', m.content, '');
                else if (m.role === 'assistant') lines.push(`## Synapse`, '', m.content, '');
            });
            download(`synapse-chat-${stamp()}.md`, lines.join('\n'), 'text/markdown');
        }

        /* ---------- Persona manager ---------- */
        const personaSelect     = document.getElementById('persona-select');
        const personaEditSelect = document.getElementById('persona-edit-select');
        const personaName       = document.getElementById('persona-name');
        const promptInput        = document.getElementById('prompt-input');
        const promptSaveBtn      = document.getElementById('prompt-save-btn');
        const promptApplyBtn     = document.getElementById('prompt-apply-btn');
        const personaNewBtn      = document.getElementById('persona-new-btn');
        const personaDeleteBtn   = document.getElementById('persona-delete-btn');
        const promptModalEl      = document.getElementById('prompt-modal');

        // Fills a <select> with persona names, selecting `selectedName`.
        function fillPersonaSelect(sel, selectedName) {
            sel.innerHTML = '';
            personas.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.name;
                opt.textContent = p.name;
                sel.appendChild(opt);
            });
            sel.value = selectedName;
        }

        // Refresh both the header dropdown and the modal editor dropdown.
        function refreshPersonaUI() {
            fillPersonaSelect(personaSelect, activePersonaName);
        }
        refreshPersonaUI();

        // Apply a persona by name: set the active prompt, its recommended
        // temperature, and restart the chat.
        function applyPersona(name) {
            const p = personas.find(x => x.name === name);
            if (!p) return;
            activePersonaName = p.name;
            SYSTEM_PROMPT = p.prompt;
            localStorage.setItem(ACTIVE_PERSONA_KEY, activePersonaName);
            fillPersonaSelect(personaSelect, activePersonaName);
            if (typeof p.temp === 'number') setTemperature(p.temp);
            clearChat(); // starts a fresh conversation with the new system prompt
        }

        // Header dropdown -> switch persona immediately.
        personaSelect.addEventListener('change', () => applyPersona(personaSelect.value));

        // ----- Modal editing -----
        // Load a persona's fields into the editor.
        function loadPersonaIntoEditor(name) {
            const p = personas.find(x => x.name === name) || personas[0];
            personaEditSelect.value = p.name;
            personaName.value = p.name;
            promptInput.value = p.prompt;
        }

        promptModalEl.addEventListener('show.bs.modal', () => {
            fillPersonaSelect(personaEditSelect, activePersonaName);
            loadPersonaIntoEditor(activePersonaName);
        });

        personaEditSelect.addEventListener('change', () =>
            loadPersonaIntoEditor(personaEditSelect.value));

        // New: blank slate in the editor.
        personaNewBtn.addEventListener('click', () => {
            personaName.value = '';
            promptInput.value = '';
            personaName.focus();
        });

        // Delete the currently-selected persona (keep at least one).
        personaDeleteBtn.addEventListener('click', () => {
            const name = personaEditSelect.value;
            if (personas.length <= 1) { alert('You must keep at least one persona.'); return; }
            if (!confirm(`Delete persona "${name}"?`)) return;
            personas = personas.filter(p => p.name !== name);
            if (activePersonaName === name) activePersonaName = personas[0].name;
            savePersonas();
            localStorage.setItem(ACTIVE_PERSONA_KEY, activePersonaName);
            refreshPersonaUI();
            fillPersonaSelect(personaEditSelect, activePersonaName);
            loadPersonaIntoEditor(activePersonaName);
        });

        // Save: create or update a persona from the editor fields.
        // Returns the saved name, or null if invalid.
        function savePersonaFromEditor() {
            const name = personaName.value.trim();
            const prompt = promptInput.value.trim();
            if (!name)   { alert('Please enter a persona name.');   personaName.focus(); return null; }
            if (!prompt) { alert('Please enter a system prompt.');  promptInput.focus(); return null; }
            const existing = personas.find(p => p.name === name);
            if (existing) existing.prompt = prompt;          // update
            else personas.push({ name, prompt });            // create
            savePersonas();
            refreshPersonaUI();
            fillPersonaSelect(personaEditSelect, name);
            return name;
        }

        promptSaveBtn.addEventListener('click', () => {
            savePersonaFromEditor(); // saves without closing the modal
        });

        // Apply & restart: save, make active, and start a fresh chat.
        promptApplyBtn.addEventListener('click', () => {
            const name = savePersonaFromEditor();
            if (name) applyPersona(name);
        });

        /* ---------- HTML live preview ---------- */
        const previewModalEl = document.getElementById('preview-modal');
        const previewFrame   = document.getElementById('preview-frame');
        previewModal = new bootstrap.Modal(previewModalEl);

        // Stop the previewed page (scripts/audio/etc.) when the modal closes,
        // and reset to preview-only mode for next time.
        previewModalEl.addEventListener('hidden.bs.modal', () => {
            previewFrame.srcdoc = '';
            setEditing(false);
        });

        // Open the current snippet in a real browser tab.
        document.getElementById('preview-newtab-btn').addEventListener('click', () => {
            const blob = new Blob([lastPreviewHtml], { type: 'text/html' });
            window.open(URL.createObjectURL(blob), '_blank');
        });

        // Copy the previewed HTML to the clipboard.
        const previewCopyBtn = document.getElementById('preview-copy-btn');
        previewCopyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(lastPreviewHtml);
                previewCopyBtn.innerHTML = '<i class="bi bi-check2 me-1"></i>Copied';
            } catch (e) {
                previewCopyBtn.innerHTML = '<i class="bi bi-x-lg me-1"></i>Failed';
            }
            setTimeout(() => previewCopyBtn.innerHTML = '<i class="bi bi-clipboard me-1"></i>Copy HTML', 1800);
        });

        // Download the previewed HTML as a .html file.
        document.getElementById('preview-download-btn').addEventListener('click', () => {
            download(`synapse-preview-${stamp()}.html`, lastPreviewHtml, 'text/html');
        });

        // Edit / Run: toggle the source editor and re-render on demand.
        const previewBody   = document.getElementById('preview-body');
        const previewEditor = document.getElementById('preview-editor');
        const previewEditBtn = document.getElementById('preview-edit-btn');
        const previewRunBtn  = document.getElementById('preview-run-btn');

        function setEditing(on) {
            previewBody.classList.toggle('editing', on);
            previewEditor.classList.toggle('d-none', !on);
            previewRunBtn.classList.toggle('d-none', !on);
            previewEditBtn.classList.toggle('btn-outline-secondary', !on);
            previewEditBtn.classList.toggle('btn-secondary', on);
            if (on) previewEditor.focus();
        }

        previewEditBtn.addEventListener('click', () => {
            setEditing(!previewBody.classList.contains('editing'));
        });

        function runEdits() {
            lastPreviewHtml = previewEditor.value;   // edits become the new source
            renderToFrame(lastPreviewHtml);
        }
        previewRunBtn.addEventListener('click', runEdits);

        // Ctrl/Cmd+Enter inside the editor re-renders.
        previewEditor.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                runEdits();
            }
        });

        /* ---------- Events ---------- */
        cancelBtn.addEventListener('click', () => currentAbortController?.abort());
        sendBtn.addEventListener('click', sendMessage);
        regenerateBtn.addEventListener('click', regenerate);
        clearBtn.addEventListener('click', clearChat);
        refreshBtn.addEventListener('click', loadModels);
        document.getElementById('export-md-btn').addEventListener('click', exportMarkdown);
        document.getElementById('export-json-btn').addEventListener('click', exportJSON);

        providerSelect.addEventListener('change', () => {
            localStorage.setItem('synapse-provider', providerSelect.value);
            loadModels();
        });
        modelSelect.addEventListener('change', () =>
            localStorage.setItem('synapse-model', modelSelect.value));

        // Highlight risky temperatures (>1.0 tends to produce incoherent output).
        function reflectTempWarning() {
            const high = parseFloat(tempRange.value) > 1.0;
            tempValue.classList.toggle('text-warning', high);
            tempValue.classList.toggle('text-primary', !high);
            tempWarn.classList.toggle('d-none', !high);
        }

        // Programmatically set the temperature slider (clamped to its range),
        // updating the label, warning state, and persisted value.
        function setTemperature(value) {
            const min = parseFloat(tempRange.min), max = parseFloat(tempRange.max);
            const t = Math.min(max, Math.max(min, parseFloat(value)));
            tempRange.value = t;
            tempValue.textContent = t.toFixed(1);
            localStorage.setItem('synapse-temp', t);
            reflectTempWarning();
        }

        tempRange.addEventListener('input', () => {
            tempValue.textContent = parseFloat(tempRange.value).toFixed(1);
            localStorage.setItem('synapse-temp', tempRange.value);
            reflectTempWarning();
        });

        userInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        /* ---------- Voice input (Web Speech API) ---------- */
        const micBtn = document.getElementById('mic-btn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let listening = false;
        let baseText = '';   // text already in the field when dictation started

        if (!SpeechRecognition) {
            // Not supported (e.g. Firefox) — hide the button.
            micBtn.classList.add('d-none');
        } else {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = document.documentElement.lang || 'en-US';

            recognition.onstart = () => {
                listening = true;
                micBtn.classList.add('listening');
                micBtn.title = 'Stop listening';
                baseText = userInput.value ? userInput.value.replace(/\s*$/, '') + ' ' : '';
            };

            recognition.onresult = (event) => {
                let finalText = '';
                let interimText = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) finalText += transcript;
                    else interimText += transcript;
                }
                if (finalText) baseText += finalText;
                userInput.value = (baseText + interimText).trimStart();
                userInput.dispatchEvent(new Event('input')); // auto-resize
            };

            recognition.onerror = (e) => {
                console.warn('Speech recognition error:', e.error);
                if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
                    alert('Microphone access was blocked. Allow it in your browser to use voice input.');
                }
            };

            recognition.onend = () => {
                listening = false;
                micBtn.classList.remove('listening');
                micBtn.title = 'Voice input';
                userInput.focus();
            };

            micBtn.addEventListener('click', () => {
                if (listening) recognition.stop();
                else { try { recognition.start(); } catch (e) { /* already starting */ } }
            });
        }

        /* ---------- Init ---------- */
        (function init() {
            const sp = localStorage.getItem('synapse-provider');
            if (sp) providerSelect.value = sp;
            const st = localStorage.getItem('synapse-temp');
            if (st) { tempRange.value = st; tempValue.textContent = parseFloat(st).toFixed(1); }
            reflectTempWarning();

            // Bootstrap popovers are opt-in: initialize the temperature help popover.
            document.querySelectorAll('[data-bs-toggle="popover"]').forEach(el =>
                new bootstrap.Popover(el, { container: 'body' }));

            const restored = loadHistory() && renderHistory();
            if (!restored) {
                chatHistory.innerHTML = '';
                const welcome = addMessageToUI("", 'bot-message');
                renderMarkdown(welcome,
                    "Welcome to **Synapse**. Pick a backend and model, then start chatting.\n\n*Ready to go!*");
            }

            loadModels();
            userInput.focus();
        })();
    </script>
</body>
</html>
